<script src="https://sortablejs.github.io/Sortable/Sortable.js"></script>

<style>
    .timeline-segment {
        padding: 10px;
        border: 1px solid #ccc;
        margin: 4px 0;
        cursor: default;
        background-color: #292929;
        color: white;
    }

    .drag-handle {
        cursor: move;
        padding: 10px;
    }

    .collapse-handle {
        cursor: pointer;
        padding: 10px;
    }

    .collapsible {
        margin: 20px;
        display: none;
    }

    .up-carot {
        display: none;
    }

    .down-carot {
        display: inline;
    }

    .undraggable {
        padding-left:20px;
    }

    .blue-background-class {
        background-color: lightblue;
    }
</style>

<div id="timeline">
    <div class="timeline-segment">
        <span class="drag-handle">⠿</span>
        <span>Item 1</span>
        <span class="collapse-handle">
            <img class="down-carot" src="../Images/down-carot.png"></img>
            <img class="up-carot" src="../Images/up-carot.png"></img>
        </span>
        <div class="collapsible"><br>Settings go here</div>
    </div>
    <div class="timeline-segment">
        <span class="drag-handle">⠿</span>
        <span>Item 2</span>
        <span class="collapse-handle">
            <img class="down-carot" src="../Images/down-carot.png"></img>
            <img class="up-carot" src="../Images/up-carot.png"></img>
        </span>
        <div class="collapsible"><br>Settings go here</div>
    </div>
    <div class="timeline-segment">
        <span class="drag-handle">⠿</span>
        <span>Item 3</span>
        <span class="collapse-handle">
            <img class="down-carot" src="../Images/down-carot.png"></img>
            <img class="up-carot" src="../Images/up-carot.png"></img>
        </span>
        <div class="collapsible"><br>Settings go here</div>
    </div>
    <div class="timeline-segment undraggable" data-id="feature">
        <span>Feature Presentation</span>
    </div>
    <div class="timeline-segment">
        <span class="drag-handle">⠿</span>
        <span>Item 4</span>
        <span class="collapse-handle">
            <img class="down-carot" src="../Images/down-carot.png"></img>
            <img class="up-carot" src="../Images/up-carot.png"></img>
        </span>
        <div class="collapsible"><br>Settings go here</div>
    </div>
    <div class="timeline-segment">
        <span class="drag-handle">⠿</span>
        <span>Item 5</span>
        <span class="collapse-handle">
            <img class="down-carot" src="../Images/down-carot.png"></img>
            <img class="up-carot" src="../Images/up-carot.png"></img>
        </span>
        <div class="collapsible"><br>Settings go here</div>
    </div>
    <div class="timeline-segment">
        <span class="drag-handle">⠿</span>
        <span>Item 6</span>
        <span class="collapse-handle">
            <img class="down-carot" src="../Images/down-carot.png"></img>
            <img class="up-carot" src="../Images/up-carot.png"></img>
        </span>
        <div class="collapsible"><br>Settings go here</div>
    </div>
</div>

<script>
    const timeline = document.getElementById('timeline');

    const sortable = new Sortable(timeline, {
        animation: 150,
        ghostClass: 'blue-background-class',
        swapThreshold: 0.50,
        handle: '.drag-handle',
        filter: '.undraggable'
    });

    var collapsehandle = document.getElementsByClassName("collapse-handle");
    var i;
    for (i = 0; i < collapsehandle.length; i++) {
      collapsehandle[i].addEventListener("click", function() {
        this.classList.toggle("active");
        const collapsible = this.nextElementSibling;
        const downCarot = this.querySelector(".down-carot");
        const upCarot = this.querySelector(".up-carot");

        if (collapsible.style.display === "block") {
            collapsible.style.display = "none";
            downCarot.style.display = "inline";
            upCarot.style.display = "none";
        } else {
            collapsible.style.display = "block";
            downCarot.style.display = "none";
            upCarot.style.display = "inline";
        }
      });
    }
</script>
