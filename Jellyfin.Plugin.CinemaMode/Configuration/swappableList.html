<script src="https://sortablejs.github.io/Sortable/Sortable.js"></script>

<style>
    .list-group-item {
        padding: 10px;
        border: 1px solid #ccc;
        margin: 4px 0;
        cursor: default;
    }

    .drag-handle {
        cursor: move;
        padding: 10px;
    }

    .blue-background-class {
        background-color: lightblue;
    }
</style>

<div id="timeline">
    <div class="list-group-item"><span class="drag-handle">⠿</span><span>Item 1</span></div>
    <div class="list-group-item"><span class="drag-handle">⠿</span><span>Item 2</span></div>
    <div class="list-group-item"><span class="drag-handle">⠿</span><span>Item 3</span></div>
    <div class="list-group-item undraggable"><span>Feature Presentation</span></div>
    <div class="list-group-item"><span class="drag-handle">⠿</span><span>Item 4</span></div>
    <div class="list-group-item"><span class="drag-handle">⠿</span><span>Item 5</span></div>
    <div class="list-group-item"><span class="drag-handle">⠿</span><span>Item 6</span></div>
</div>

<script>
    const timeline = document.getElementById('timeline');

    new Sortable(timeline, {
        animation: 150,
        ghostClass: 'blue-background-class',
        swapThreshold: 0.50,
        handle: '.drag-handle',
        filter: '.undraggable'
    });
</script>
